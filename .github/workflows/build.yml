name: Build noopt.ko for Xiaomi 13 Fuxi (vermagic fixed)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:android13-5.15
      options: --platform linux/amd64
    steps:
      - name: Clone NoOpt source
        run: git clone --depth=1 https://github.com/Yon8/NoOpt.git /tmp/noopt
      - name: Patch vermagic.h to match Xiaomi 13 Fuxi kernel
        run: |
          VERMAGIC_H=$(find /opt/ddk/kdir/android13-5.15 -name "vermagic.h" 2>/dev/null | head -1)
          echo "Found vermagic.h at: $VERMAGIC_H"
          [ -z "$VERMAGIC_H" ] && VERMAGIC_H="/opt/ddk/kdir/android13-5.15/include/linux/vermagic.h"
          cat "$VERMAGIC_H" || true
          sed -i 's/#define UTS_RELEASE ".*"/#define UTS_RELEASE "5.15.178-android13-8-00021-g6f2f96be86b9-ab13729987"/' "$VERMAGIC_H" 2>/dev/null || true
          cat "$VERMAGIC_H" || true
      - name: Patch utsrelease.h
        run: |
          UTS_H=$(find /opt/ddk/kdir/android13-5.15 -name "utsrelease.h" 2>/dev/null | head -1)
          if [ -n "$UTS_H" ]; then
            sed -i 's/#define UTS_RELEASE ".*"/#define UTS_RELEASE "5.15.178-android13-8-00021-g6f2f96be86b9-ab13729987"/' "$UTS_H"
          else
            mkdir -p /opt/ddk/kdir/android13-5.15/include/generated 2>/dev/null || true
            echo '#define UTS_RELEASE "5.15.178-android13-8-00021-g6f2f96be86b9-ab13729987"' > /opt/ddk/kdir/android13-5.15/include/generated/utsrelease.h
          fi
      - name: Build noopt.ko
        run: |
          cd /tmp/noopt/kernel
          make KDIR=/opt/ddk/kdir/android13-5.15 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 CC=clang CONFIG_KSU=m CFLAGS_MODULE="-Wno-error" -j$(nproc)
          ls -la noopt.ko
          strings noopt.ko | grep -E "vermagic|5\.15\.178" || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noopt-kernel-module-xiaomi13-fuxi
          path: /tmp/noopt/kernel/noopt.ko
