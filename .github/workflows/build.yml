name: Build noopt.ko for Xiaomi 13 Fuxi (Xiaomi kernel source)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:android13-5.15
      options: --platform linux/amd64
    steps:
      - name: Clone NoOpt source
        run: git clone --depth=1 https://github.com/leoegj/NoOpt.git /tmp/noopt
      - name: Clone Xiaomi 13 Fuxi kernel source
        run: |
          git clone --depth=1 --branch fuxi-t-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            /tmp/xiaomi-kernel
          echo "=== Cloned Xiaomi kernel source ==="
          ls /tmp/xiaomi-kernel/
      - name: Prepare kernel build environment
        run: |
          cd /tmp/xiaomi-kernel
          # Use the DDK's existing kernel config as base (same GKI android13-5.15)
          # Then add the Xiaomi-specific configs from the source
          KDIR_OLD=/opt/ddk/kdir/android13-5.15
          # Create necessary directories and link DDK infrastructure
          mkdir -p include/config include/generated
          # Copy DDK's .config as starting point, then apply Xiaomi config
          cp "$KDIR_OLD/.config" .config 2>/dev/null || true
          # Copy Xiaomi vendor config if exists
          for cf in arch/arm64/configs/vendor/*fuxi* arch/arm64/configs/*fuxi*; do
            if [ -f "$cf" ]; then
              echo "Found Xiaomi defconfig: $cf"
              cat "$cf" >> .config 2>/dev/null || true
            fi
          done
          # Link key infrastructure from DDK
          ln -sf "$KDIR_OLD/scripts" scripts 2>/dev/null || cp -a "$KDIR_OLD/scripts" . 2>/dev/null || true
          ln -sf "$KDIR_OLD/tools" tools 2>/dev/null || true
          # Make olddefconfig to resolve
          make ARCH=arm64 olddefconfig 2>&1 | tail -5 || true
          # Prepare kernel build (generate version.h, autoconf.h, etc.)
          make ARCH=arm64 prepare 2>&1 | tail -10 || true
          make ARCH=arm64 scripts 2>&1 | tail -5 || true
          # Copy Module.symvers from DDK
          cp "$KDIR_OLD/Module.symvers" Module.symvers 2>/dev/null || true
      - name: Build noopt.ko against Xiaomi kernel source
        run: |
          cd /tmp/noopt/kernel
          make KDIR=/tmp/xiaomi-kernel ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 CC=clang CONFIG_KSU=m CFLAGS_MODULE="-Wno-error" -j$(nproc) 2>&1
          echo "=== Build result ==="
          ls -la noopt.ko 2>/dev/null || echo "BUILD FAILED"
      - name: Verify vermagic
        run: |
          if [ -f /tmp/noopt/kernel/noopt.ko ]; then
            echo "=== Vermagic check ==="
            strings /tmp/noopt/kernel/noopt.ko | grep -E "vermagic|5\.15\."
            echo "=== File info ==="
            ls -la /tmp/noopt/kernel/noopt.ko
          else
            echo "=== BUILD FAILED - no noopt.ko produced ==="
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noopt-kernel-module-xiaomi13-fuxi
          path: /tmp/noopt/kernel/noopt.ko
