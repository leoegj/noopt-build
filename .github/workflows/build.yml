name: Build noopt.ko for Xiaomi 13 Fuxi (CFI disabled)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:android13-5.15
      options: --platform linux/amd64
    steps:
      - name: Clone NoOpt source
        run: git clone --depth=1 https://github.com/leoegj/NoOpt.git /tmp/noopt
      - name: Set kernel config to match Xiaomi 13 Fuxi
        run: |
          KDIR=/opt/ddk/kdir/android13-5.15
          # Patch utsrelease.h to match Xiaomi 13 Fuxi kernel vermagic
          UTS_H="$KDIR/include/generated/utsrelease.h"
          if [ -f "$UTS_H" ]; then
            sed -i 's/#define UTS_RELEASE ".*"/#define UTS_RELEASE "5.15.178-android13-8-00021-g6f2f96be86b9-ab13729987"/' "$UTS_H"
          else
            mkdir -p "$KDIR/include/generated" 2>/dev/null || true
            echo '#define UTS_RELEASE "5.15.178-android13-8-00021-g6f2f96be86b9-ab13729987"' > "$UTS_H"
          fi
          echo "Patched utsrelease.h:"
          cat "$UTS_H"
      - name: Build noopt.ko (CFI disabled)
        run: |
          cd /tmp/noopt/kernel
          # CFI_CLANG on Xiaomi kernel uses different type hashes than DDK.
          # Without CFI disabled, calling kprobe-resolved function pointers
          # (kern_path/path_put) triggers CFI mismatch -> kernel panic.
          # Kbuild already has ccflags-y += -fno-sanitize=cfi
          make KDIR=/opt/ddk/kdir/android13-5.15 ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- LLVM=1 CC=clang \
            CFLAGS_MODULE="-Wno-error" \
            -j$(nproc) 2>&1
          echo "=== Build result ==="
          ls -la noopt.ko 2>/dev/null || echo "BUILD FAILED"
      - name: Verify vermagic
        run: |
          if [ -f /tmp/noopt/kernel/noopt.ko ]; then
            echo "=== Vermagic check ==="
            strings /tmp/noopt/kernel/noopt.ko | grep -E "vermagic|5\.15\."
            echo "=== File info ==="
            ls -la /tmp/noopt/kernel/noopt.ko
          else
            echo "=== BUILD FAILED - no noopt.ko produced ==="
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: noopt-kernel-module-xiaomi13-fuxi
          path: /tmp/noopt/kernel/noopt.ko
